name: Lint & Weekly Data Refresh

on:
  push:
    branches: ["main", "release/**"]
  pull_request:
    branches: ["main", "release/**"]
  schedule:
    # Run every Sunday at 03:00 UTC.
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # lint — runs on every push and PR
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (pytest + luacheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          # Optional: jsonschema for schema-validation tests.
          pip install jsonschema || true

      - name: Run pytest
        run: pytest tools/ -v --tb=short

      - name: Install luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: |
          luacheck . --config .luacheckrc

  # ---------------------------------------------------------------------------
  # refresh — scheduled weekly, only runs on the default branch
  # ---------------------------------------------------------------------------
  refresh:
    name: Weekly Data Refresh
    runs-on: ubuntu-latest
    # Only run on schedule (or manual dispatch) — skip for push/PR events.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    # Needs write permission to open a PR.
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Check out the main branch so the PR diffs against it cleanly.
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run wowaudit.py
        env:
          WOWAUDIT_API_KEY: ${{ secrets.WOWAUDIT_API_KEY }}
        run: |
          python tools/wowaudit.py \
            --api-key "$WOWAUDIT_API_KEY" \
            --tier TWW-S3

      - name: Open PR if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: weekly data refresh (${{ github.run_started_at }})"
          branch: "chore/weekly-refresh-${{ github.run_id }}"
          delete-branch: true
          title: "chore: weekly data refresh (${{ github.run_started_at }})"
          body: |
            Automated weekly refresh of `Data/BobleLoot_Data.lua` via `tools/wowaudit.py`.

            Review the diff to confirm roster changes, M+ cap updates, and BiS list accuracy
            before merging.

            **Triggered by:** scheduled workflow run `${{ github.run_id }}`
          labels: "automated,data-refresh"
          # Only create a PR when Data/BobleLoot_Data.lua actually changed.
          add-paths: |
            Data/BobleLoot_Data.lua
